version: "3.9"

services:

  # ── 1. DATABASE ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: omnitestai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    ports:
      - "5432:5432"

  # ── 2. BACKEND (FastAPI + Prisma) ───────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omnitestai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      # Persist uploaded/generated media (screenshots, videos) outside the
      # container so it survives rebuilds and redeploys.
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    # No "ports:" mapping — only Nginx talks to the backend directly.
    # If you need to hit the API directly for debugging, temporarily add:
    #   ports: ["8000:8000"]

  # ── 3. FRONTEND (React build served by its own nginx) ───────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. Left relative so it always
        # resolves against whatever host/domain served the page — works
        # identically on localhost, staging, or production without rebuilding.
        VITE_API_BASE_URL: /api
    container_name: omnitestai-frontend
    restart: unless-stopped
    networks:
      - internal
    # No "ports:" mapping — only the reverse-proxy nginx serves this to
    # the outside world.

  # ── 4. NGINX REVERSE PROXY (the only container exposed publicly) ─
  nginx:
    image: nginx:1.27-alpine
    container_name: omnitestai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Add "443:443" here once you wire up TLS certs (e.g. via certbot).
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  media_data: