server {
    listen 80;
    server_name _;

    # Media files (screenshots/videos) can be large — raise the body size
    # limit so uploads/serving don't get rejected.
    client_max_body_size 50M;

    # ── Everything else → the frontend container ────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── /api/* → the backend running natively on Windows (uvicorn) ────
    # Strips the "/api" prefix before forwarding, so the backend keeps
    # using its existing routes (e.g. /execute/nl, /results/) unchanged.
    # host.docker.internal is Docker Desktop's special DNS name for
    # reaching the Windows host machine from inside a container — swap
    # this back to "backend:8000" once the backend goes back into Docker.
    location /api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Some of your executions (NL agent loop, suite runs) take a while —
        # don't let nginx time out mid-run.
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # ── /media/* → serve saved screenshots/videos straight from the
    #    backend's media volume ──────────────────────────────────
    location /media/ {
        proxy_pass http://host.docker.internal:8000/media/;
        proxy_set_header Host $host;
    }
}