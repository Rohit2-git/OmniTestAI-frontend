server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router / client-side routing: any path that isn't a real file
    # falls back to index.html so deep links and refreshes work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built JS/CSS assets aggressively — their filenames are
    # content-hashed by Vite, so a new build always gets a new filename.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}